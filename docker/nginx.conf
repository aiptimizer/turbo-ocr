daemon on;
pid /tmp/nginx.pid;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /dev/stderr error;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    access_log off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    default_type application/json;

    upstream ocr_backend {
        server 127.0.0.1:8080;
        keepalive 128;
    }

    server {
        listen 8000 backlog=4096 reuseport;

        client_max_body_size 100m;
        proxy_connect_timeout 120s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_next_upstream off;

        # JSON error pages for all nginx-generated errors
        error_page 413 =413 @error_413;
        error_page 502 =502 @error_502;
        error_page 504 =504 @error_504;

        location @error_413 {
            return 413 '{"error":"Request body too large (max 100MB)"}';
        }
        location @error_502 {
            return 502 '{"error":"Backend unavailable"}';
        }
        location @error_504 {
            return 504 '{"error":"Backend timeout"}';
        }

        location / {
            proxy_pass http://ocr_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header X-Request-Id $http_x_request_id;
        }
    }
}
